name: parser-requirements

on:
  push:
    branches: [main, master]
    paths:
      - "requirements.txt"
      - ".github/workflows/parser-requirements.yml"
  pull_request:
    paths:
      - "requirements.txt"
      - ".github/workflows/parser-requirements.yml"

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify requirements.txt resolves
        run: |
          python -m pip install --upgrade pip
          pip install --dry-run -r requirements.txt
