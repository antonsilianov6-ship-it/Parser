name: webpanel-frontend

on:
  push:
    branches: [main, master]
    paths:
      - "webpanel/frontend/**"
      - ".github/workflows/webpanel-frontend.yml"
  pull_request:
    paths:
      - "webpanel/frontend/**"
      - ".github/workflows/webpanel-frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webpanel/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webpanel/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type & Svelte check
        run: npm run check

      - name: Build
        run: npm run build
